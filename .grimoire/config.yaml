project:
  name: "Grimoire AI"
  description: "Local-first, AI-native requirements management CLI tool that stores project knowledge as structured markdown files with YAML frontmatter"

embedding:
  provider: local # local | ollama | openai | anthropic
  model: nomic-embed-text-v1.5

search:
  default_limit: 10
  semantic_weight: 0.5
  keyword_weight: 0.5

ui:
  port: 4444
  auto_open: true

sync:
  auto_sync: true
  watch: false

ids:
  auto_generate: true
  prefix_by_type: true
